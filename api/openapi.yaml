openapi: 3.0.3
info:
  title: HomeWorldz Internal API
  version: 0.1.0
servers:
  - url: http://localhost:42000
paths:
  /ping:
    parameters:
      - $ref: "#/components/parameters/RequestId"
    get:
      operationId: ping
      summary: Report process liveness
      responses:
        "200":
          description: Process is alive
          headers:
            X-Request-ID: { $ref: "#/components/headers/RequestId" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Status" }
        "405":
          description: The endpoint only supports GET
          headers:
            X-Request-ID: { $ref: "#/components/headers/RequestId" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /ready:
    parameters:
      - $ref: "#/components/parameters/RequestId"
    get:
      operationId: ready
      summary: Report whether the service can accept traffic
      responses:
        "200":
          description: Service is ready
          headers:
            X-Request-ID: { $ref: "#/components/headers/RequestId" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Status" }
        "503":
          description: A required dependency is unavailable
          headers:
            X-Request-ID: { $ref: "#/components/headers/RequestId" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "405":
          description: The endpoint only supports GET
          headers:
            X-Request-ID: { $ref: "#/components/headers/RequestId" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /version:
    parameters:
      - $ref: "#/components/parameters/RequestId"
    get:
      operationId: version
      summary: Report build and API versions
      responses:
        "200":
          description: Version information
          headers:
            X-Request-ID: { $ref: "#/components/headers/RequestId" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Version" }
        "405":
          description: The endpoint only supports GET
          headers:
            X-Request-ID: { $ref: "#/components/headers/RequestId" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/v1/regions:
    parameters:
      - $ref: "#/components/parameters/RequestId"
    get:
      operationId: discoverRegions
      summary: Discover regions with active leases
      security:
        - ServiceToken: []
      responses:
        "200":
          description: Active regions
          headers:
            X-Request-ID: { $ref: "#/components/headers/RequestId" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RegionList" }
        "401":
          description: A valid service token is required
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    post:
      operationId: registerRegion
      summary: Register a region and acquire a lease
      security:
        - ServiceToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRegionRequest" }
      responses:
        "201":
          description: Region registered
          headers:
            X-Request-ID: { $ref: "#/components/headers/RequestId" }
            Location:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Region" }
        "400":
          description: Invalid registration
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: A valid service token is required
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: Coordinates are already leased
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/v1/regions/{regionId}:
    parameters:
      - $ref: "#/components/parameters/RequestId"
      - $ref: "#/components/parameters/RegionId"
    get:
      operationId: getRegion
      summary: Discover one region with an active lease
      security:
        - ServiceToken: []
      responses:
        "200":
          description: Active region
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Region" }
        "404":
          description: Region is absent or expired
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      operationId: deregisterRegion
      summary: Deregister a region
      security:
        - ServiceToken: []
      responses:
        "204":
          description: Region deregistered
        "404":
          description: Region was not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/v1/regions/{regionId}/lease:
    parameters:
      - $ref: "#/components/parameters/RequestId"
      - $ref: "#/components/parameters/RegionId"
    put:
      operationId: renewRegionLease
      summary: Renew an active region lease
      security:
        - ServiceToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RenewRegionLeaseRequest" }
      responses:
        "200":
          description: Renewed region lease
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Region" }
        "400":
          description: Invalid lease duration
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Region is absent or expired
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
components:
  parameters:
    RequestId:
      name: X-Request-ID
      in: header
      required: false
      description: Caller-provided request identifier; unsafe values are replaced.
      schema:
        type: string
        maxLength: 128
        pattern: "^[A-Za-z0-9._-]+$"
    RegionId:
      name: regionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  headers:
    RequestId:
      required: true
      description: Valid caller-provided request identifier or a generated identifier.
      schema:
        type: string
  securitySchemes:
    ServiceToken:
      type: http
      scheme: bearer
      description: Required by service-to-service operations under /api/.
  schemas:
    Status:
      type: object
      required: [status]
      properties:
        status: { type: string }
    Version:
      type: object
      required: [service, version, apiVersion]
      properties:
        service: { type: string }
        version: { type: string }
        apiVersion: { type: string }
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
    RegisterRegionRequest:
      type: object
      required: [name, gridX, gridY, publicEndpoint]
      properties:
        name: { type: string, minLength: 1, maxLength: 128 }
        gridX: { type: integer, minimum: 0 }
        gridY: { type: integer, minimum: 0 }
        publicEndpoint: { type: string, format: uri }
        leaseSeconds: { type: integer, minimum: 10, maximum: 300, default: 60 }
    RenewRegionLeaseRequest:
      type: object
      required: [leaseSeconds]
      properties:
        leaseSeconds: { type: integer, minimum: 10, maximum: 300 }
    Region:
      type: object
      required: [id, name, gridX, gridY, publicEndpoint, leaseExpiresAt]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        gridX: { type: integer }
        gridY: { type: integer }
        publicEndpoint: { type: string, format: uri }
        leaseExpiresAt: { type: string, format: date-time }
    RegionList:
      type: object
      required: [regions]
      properties:
        regions:
          type: array
          items: { $ref: "#/components/schemas/Region" }
