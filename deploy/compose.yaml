services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: homeworldz
      POSTGRES_USER: homeworldz
      POSTGRES_PASSWORD: homeworldz
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homeworldz"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - homeworldz-postgres:/var/lib/postgresql/data
volumes:
  homeworldz-postgres:

