[server]
address = 127.0.0.1:8002
public_url = https://grid.homeworldz.com

[grid]
name = HomeWorldz

[client]
url = http://127.0.0.1:8002

[auth]
# Replace this with a long random value shared only with this grid's regions.
service_token = change-me

# Browser-facing website API (homeworldz-api), reverse-proxied by Caddy as
# api.homeworldz.com -> 127.0.0.1:8003 (see deploy/linux/Caddyfile.api).
[website]
address = 127.0.0.1:8003
allowed_origins = https://homeworldz.com
# Replace this with a long random value; rotating it invalidates all sessions.
jwt_secret = change-me
token_ttl_seconds = 3600

[mail]
transport = smtp
from = welcome@homeworldz.com
verification_url = https://homeworldz.com/verify
# SMTP relay used when transport = smtp. These values are for Cloudflare Email
# Sending, which requires implicit TLS on port 465 with the literal username
# "api_token" and a Cloudflare API token as the password.
smtp_host = smtp.mx.cloudflare.net
smtp_port = 465
smtp_username = api_token
smtp_password = change-me
smtp_implicit_tls = true
